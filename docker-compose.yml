# HRMS Belarus: одна общая сеть (hrms-belarus-network), n8n + фронт + Supabase.
# Сеть создаётся скриптом docker/up-all.ps1 или вручную: docker network create hrms-belarus-network
# Supabase подключается к ней через docker/docker-compose.supabase-network.yml.

name: hrms-belarus

networks:
  hrms-network:
    name: hrms-belarus-network
    external: true

services:
  n8n-db:
    image: postgres:15-alpine
    container_name: hrms-n8n-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:-n8n}
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
    volumes:
      - n8n-db-data:/var/lib/postgresql/data
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n} -d ${N8N_DB_NAME:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: hrms-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      NODE_ENV: production
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:-n8n}
      # Supabase: из контейнера n8n обращаться по имени сервиса (когда Supabase в той же сети)
      SUPABASE_URL: http://kong:8000
      SUPABASE_REST_URL: http://kong:8000/rest/v1
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      n8n-db:
        condition: service_healthy
    networks:
      - hrms-network

  hrms-web:
    build:
      context: ./hrms-web
      dockerfile: Dockerfile
      args:
        # Supabase: URL Kong с хоста. Ключ — задать в .env или совпадает с Supabase demo (см. docker/README.md)
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE}
    container_name: hrms-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Браузер: localhost (запросы с хоста)
      NEXT_PUBLIC_N8N_WEBHOOK_URL: http://localhost:5678
      # Сервер (API /api/webhook/crud): из контейнера — по имени сервиса n8n
      N8N_WEBHOOK_URL: http://n8n:5678/webhook
      N8N_WEBHOOK_TEST_URL: http://n8n:5678/webhook-test
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE}
    depends_on:
      - n8n
    networks:
      - hrms-network

volumes:
  n8n-data:
  n8n-db-data:
